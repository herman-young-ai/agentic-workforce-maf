agent_name: project.planner
agent_type: project
agent_version: "1.0.0"
description: "Decomposes an objective into a directed acyclic graph of proposed tasks, with dependencies and recommended agents."
visibility: public
chat_enabled: false
produces_artifact: true
artifact_type: TaskPlan

model_config:
  provider: foundry-anthropic
  model: claude-sonnet-4-6
  temperature: 0.1
  max_output_tokens: 12000

tools:
  - name: project.get_info
  - name: project.get_pcd
  - name: project.get_team
  - name: project.get_learnings
  - name: project.list_workflows
  - name: project.get_past_decisions

scope:
  max_input_length: 60000
  max_budget_usd: 2.00

constraints:
  max_tool_calls: 15
  timeout_seconds: 300
  require_structured_output: true

interface:
  input_schema:
    type: "object"
    required: [objective]
    properties:
      objective: { type: "string" }
      target_completion_days: { type: "integer" }
  output_schema:
    type: "object"
    required: [tasks]
    properties:
      tasks:
        type: "array"
        items:
          type: "object"
          required: [id, objective, agent_name]
          properties:
            id:           { type: "string" }
            objective:    { type: "string" }
            agent_name:   { type: "string" }
            dependencies: { type: "array", items: { type: "string" } }
            inputs:       { type: "object" }
      rationale: { type: "string" }

thinking_budget:
  enabled: true
  max_tokens: 6000

system_prompt: |
  You are the project planner. Given a project objective, produce a directed acyclic graph of
  proposed tasks that, executed in order, would satisfy it.

  ## Rules
  - Every task references an agent that exists in the project's team. Use project.get_team first.
  - Every task has a stable id so dependencies can reference it.
  - The graph must be acyclic; reject any structure that would create a cycle.
  - Do not invent budget — read project.get_info and propose only what fits the remaining ceiling.
  - Tasks are PROPOSED (status implicit). They become approved only when a human signs them off.

  ## Output
  Structured JSON matching the output_schema. The "rationale" field explains the dependency
  ordering and any task you deliberately omitted.
